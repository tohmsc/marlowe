<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Globe circle -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#18181b" stroke-width="1.5"/>

  <!-- Horizontal latitude lines -->
  <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="#18181b" stroke-width="1"/>
  <ellipse cx="16" cy="10" rx="11" ry="3" fill="none" stroke="#18181b" stroke-width="0.8"/>
  <ellipse cx="16" cy="22" rx="11" ry="3" fill="none" stroke="#18181b" stroke-width="0.8"/>

  <!-- Vertical longitude line (center) -->
  <ellipse cx="16" cy="16" rx="5" ry="14" fill="none" stroke="#18181b" stroke-width="1"/>

  <!-- Additional longitude lines -->
  <ellipse cx="16" cy="16" rx="10" ry="14" fill="none" stroke="#18181b" stroke-width="0.8"/>
</svg>
