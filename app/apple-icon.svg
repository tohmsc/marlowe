<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background -->
  <rect width="180" height="180" fill="#f5f4f0"/>

  <!-- Globe circle -->
  <circle cx="90" cy="90" r="60" fill="none" stroke="#18181b" stroke-width="3"/>

  <!-- Horizontal latitude lines -->
  <ellipse cx="90" cy="90" rx="60" ry="22" fill="none" stroke="#18181b" stroke-width="2"/>
  <ellipse cx="90" cy="68" rx="48" ry="12" fill="none" stroke="#18181b" stroke-width="1.5"/>
  <ellipse cx="90" cy="112" rx="48" ry="12" fill="none" stroke="#18181b" stroke-width="1.5"/>

  <!-- Vertical longitude line (center) -->
  <ellipse cx="90" cy="90" rx="22" ry="60" fill="none" stroke="#18181b" stroke-width="2"/>

  <!-- Additional longitude lines -->
  <ellipse cx="90" cy="90" rx="42" ry="60" fill="none" stroke="#18181b" stroke-width="1.5"/>
</svg>
